<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results — EXU DETECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-light: #F7F9FC;
            --bg-dark: #0B1120;
            --primary: #0057FF;
            --secondary: #00C896;
            --danger: #FF3B3B;
            --warning: #F5A623;
            --text-primary: #0B1120;
            --text-muted: #6B7A99;
            --border: #E2E8F0;
            --card-bg: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .results-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 24px;
            transition: color 200ms ease-in-out;
        }

        .back-link:hover {
            color: var(--primary);
        }

        /* Result Header Card */
        .result-header {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .patient-info {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .badge {
            background: var(--bg-light);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Mono', monospace;
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            margin-bottom: 32px;
        }

        .result-status {
            display: flex;
            align-items: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .status-badge {
            flex: 1;
            min-width: 280px;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
        }

        .status-badge.safe {
            background: #E6FBF4;
            color: var(--secondary);
        }

        .status-badge.moderate {
            background: #FFF7E6;
            color: var(--warning);
        }

        .status-badge.infected {
            background: #FFF0F0;
            color: var(--danger);
        }

        .status-badge h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .confidence-gauge {
            width: 160px;
            height: 160px;
            position: relative;
        }

        .gauge-svg {
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: var(--border);
            stroke-width: 8;
        }

        .gauge-fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-out;
        }

        .gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .gauge-value {
            font-size: 36px;
            font-weight: 800;
        }

        .gauge-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Analysis Section */
        .analysis-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .analysis-section h3 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        .scan-image {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .detected-markers {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .marker-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--bg-light);
            border-radius: 8px;
        }

        .marker-name {
            font-weight: 600;
            text-transform: capitalize;
        }

        .severity-chip {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .severity-chip.none,
        .severity-chip.low {
            background: #E6FBF4;
            color: var(--secondary);
        }

        .severity-chip.moderate {
            background: #FFF7E6;
            color: var(--warning);
        }

        .severity-chip.high {
            background: #FFF0F0;
            color: var(--danger);
        }

        /* Next Steps */
        .next-steps {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .next-steps h3 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .steps-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .step-card {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid;
        }

        .step-card.safe {
            background: #E6FBF4;
            border-color: var(--secondary);
        }

        .step-card.moderate {
            background: #FFF7E6;
            border-color: var(--warning);
        }

        .step-card.infected {
            background: #FFF0F0;
            border-color: var(--danger);
        }

        .step-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .step-content h4 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .step-content p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* CTAs */
        .ctas {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 200ms ease-in-out;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: #0044cc;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 87, 255, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-ghost {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .btn-ghost:hover {
            background: var(--border);
        }

        /* Chatbot */
        #iris-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
        }

        #iris-minimized {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 87, 255, 0.4);
            transition: all 200ms ease-in-out;
        }

        #iris-minimized:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 24px rgba(0, 87, 255, 0.5);
        }

        #iris-maximized {
            width: 380px;
            height: 520px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .iris-header {
            background: var(--primary);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        .iris-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .iris-avatar-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .iris-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            margin-left: 8px;
            font-size: 18px;
        }

        .iris-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-light);
        }

        .iris-message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .iris-message.bot {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .iris-message.user {
            background: var(--primary);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .iris-input-area {
            padding: 16px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .iris-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .iris-input:focus {
            border-color: var(--primary);
        }

        .iris-btn {
            padding: 12px 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }

            .result-status {
                flex-direction: column;
            }

            .confidence-gauge {
                width: 120px;
                height: 120px;
            }

            .ctas {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            #iris-maximized {
                width: calc(100vw - 32px);
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="results-container">
        <a href="/scan/capture" class="back-link">← Back to scan</a>

        <!-- Result Header -->
        <div class="result-header">
            <div class="patient-info">
                <span class="badge" id="patient-name">—</span>
                <span class="badge" id="patient-age">—</span>
                <span class="badge" id="patient-blood">—</span>
            </div>
            <div class="timestamp" id="timestamp">—</div>
            
            <div class="result-status">
                <div class="status-badge" id="status-badge">
                    <h2 id="status-text">—</h2>
                </div>
                <div class="confidence-gauge">
                    <svg class="gauge-svg" width="100%" height="100%" viewBox="0 0 120 120">
                        <circle class="gauge-bg" cx="60" cy="60" r="52"/>
                        <circle class="gauge-fill" id="gauge-fill" cx="60" cy="60" r="52"
                            stroke-dasharray="326.73"
                            stroke-dashoffset="326.73"/>
                    </svg>
                    <div class="gauge-text">
                        <div class="gauge-value" id="confidence-value">0%</div>
                        <div class="gauge-label">Confidence</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Analysis Breakdown -->
        <div class="analysis-section">
            <h3>Analysis breakdown</h3>
            <div class="analysis-grid">
                <div>
                    <img id="scan-image" class="scan-image" src="" alt="Scan">
                </div>
                <div class="detected-markers" id="markers-list">
                    <!-- Markers will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Next Steps -->
        <div class="next-steps">
            <h3>What should you do next?</h3>
            <div class="steps-list" id="steps-list">
                <!-- Steps will be populated by JS -->
            </div>
        </div>

        <!-- CTAs -->
        <div class="ctas">
            <button class="btn btn-primary" onclick="downloadPDF()">📥 Download Report (PDF)</button>
            <a href="/scan/details" class="btn btn-ghost">New Scan</a>
            <button class="btn btn-outline" onclick="shareReport()">🔗 Share with Doctor</button>
        </div>
    </div>

    <!-- Chatbot -->
    <div id="iris-widget">
        <div id="iris-maximized" style="display: none;">
            <div class="iris-header">
                <div class="iris-header-info">
                    <img src="/static/eye-iris.png" alt="Iris" class="iris-avatar-img">
                    <div>
                        <p class="iris-name" style="font-weight: 700;">Iris</p>
                        <p style="font-size: 12px; opacity: 0.9;">AI Eye Health Assistant</p>
                    </div>
                </div>
                <div class="iris-controls">
                    <button onclick="toggleIris('minimize')">−</button>
                    <button onclick="toggleIris('close')">×</button>
                </div>
            </div>
            <div class="iris-messages" id="iris-messages">
                <div class="iris-message bot">👋 Hello! I'm Iris, your AI eye health assistant. How can I help you today?</div>
            </div>
            <div class="iris-input-area">
                <input type="text" class="iris-input" id="iris-input" placeholder="Ask about eye health..." onkeypress="if(event.key==='Enter') sendToIris()">
                <button class="iris-btn" onclick="sendToIris()">Send</button>
            </div>
        </div>
        <button id="iris-minimized" onclick="toggleIris('maximize')">💬</button>
    </div>

    <script>
        let resultData = {};

        // Chatbot functions
        function toggleIris(action) {
            const maximized = document.getElementById('iris-maximized');
            const minimized = document.getElementById('iris-minimized');
            if (action === 'maximize') {
                maximized.style.display = 'flex';
                minimized.style.display = 'none';
            } else {
                maximized.style.display = 'none';
                minimized.style.display = 'block';
            }
        }

        async function sendToIris() {
            const input = document.getElementById('iris-input');
            const message = input.value.trim();
            if (!message) return;
            const messagesDiv = document.getElementById('iris-messages');
            messagesDiv.innerHTML += `<div class="iris-message user">${message}</div>`;
            input.value = '';
            messagesDiv.innerHTML += '<div class="iris-message bot" id="typing">Typing...</div>';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message})
                });
                const data = await res.json();
                document.getElementById('typing').remove();
                messagesDiv.innerHTML += `<div class="iris-message bot">${data.response}</div>`;
            } catch (e) {
                document.getElementById('typing').remove();
                messagesDiv.innerHTML += '<div class="iris-message bot">Sorry, I\'m having trouble responding.</div>';
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function loadResults() {
            try {
                const stored = sessionStorage.getItem('lastScanResult');
                if (stored) {
                    resultData = JSON.parse(stored);
                    displayResults();
                } else {
                    window.location.href = '/scan/details';
                }
            } catch (err) {
                console.error('Error loading results:', err);
            }
        }

        function displayResults() {
            const patient = resultData.patient || {};
            document.getElementById('patient-name').textContent = patient.full_name || '—';
            document.getElementById('patient-age').textContent = `Age: ${patient.age || '—'}`;
            document.getElementById('patient-blood').textContent = patient.blood_group || '—';
            
            const timestamp = new Date(resultData.timestamp).toLocaleString();
            document.getElementById('timestamp').textContent = `Scan completed: ${timestamp}`;
            
            const statusBadge = document.getElementById('status-badge');
            statusBadge.className = `status-badge ${resultData.overall_status}`;
            document.getElementById('status-text').textContent = resultData.status_text;
            
            const confidence = resultData.confidence || 0;
            const circumference = 2 * Math.PI * 52;
            const offset = circumference - (confidence / 100) * circumference;
            const gaugeFill = document.getElementById('gauge-fill');
            
            let gaugeColor;
            if (resultData.overall_status === 'safe') gaugeColor = '#00C896';
            else if (resultData.overall_status === 'moderate') gaugeColor = '#F5A623';
            else gaugeColor = '#FF3B3B';
            
            gaugeFill.style.stroke = gaugeColor;
            setTimeout(() => {
                gaugeFill.style.strokeDashoffset = offset;
            }, 100);
            
            document.getElementById('confidence-value').textContent = `${confidence.toFixed(1)}%`;
            
            const scores = resultData.scores || {};
            const imageType = resultData.image_type || 'eye_photo';
            const markersList = document.getElementById('markers-list');
            markersList.innerHTML = '';
            
            // Filter and sort scores (only show conditions with score > 0)
            const relevantScores = Object.entries(scores)
                .filter(([condition, score]) => score > 0)
                .sort((a, b) => b[1] - a[1]);
            
            // Add image type indicator
            const imageTypeText = imageType === 'retinal' ? 
                'Retinal Scan (Fundus)" detected' : 
                'Eye Photo detected';
            
            relevantScores.forEach(([condition, score]) => {
                const percentage = (score * 100).toFixed(1);
                let severity = 'none';
                if (score > 0.7) severity = 'high';
                else if (score > 0.3) severity = 'moderate';
                else if (score > 0.1) severity = 'low';
                
                const markerHTML = `
                    <div class="marker-item">
                        <span class="marker-name">${condition.replace('_', ' ')}</span>
                        <span class="severity-chip ${severity}">${percentage}% - ${severity}</span>
                    </div>
                `;
                markersList.innerHTML += markerHTML;
            });
            
            // If no conditions detected
            if (relevantScores.length === 0) {
                markersList.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No conditions detected</p>';
            }
            
            const stepsList = document.getElementById('steps-list');
            stepsList.innerHTML = '';
            
            let steps = [];
            if (resultData.overall_status === 'safe') {
                steps = [
                    { icon: '✅', title: 'No conditions detected', desc: 'Your scan shows no signs of eye conditions.' },
                    { icon: '📅', title: 'Regular check-ups', desc: 'Continue with routine eye examinations.' },
                    { icon: '👁️', title: 'Eye care tips', desc: 'Rest your eyes regularly and maintain good lighting.' }
                ];
            } else if (resultData.overall_status === 'moderate') {
                steps = [
                    { icon: '👨‍⚕️', title: 'Consult an ophthalmologist', desc: 'Schedule an appointment within 48 hours.' },
                    { icon: '📋', title: 'Note symptoms', desc: 'Track any changes in your vision or eye comfort.' },
                    { icon: '💊', title: 'Do not self-medicate', desc: 'Use only prescribed eye drops or medications.' }
                ];
            } else {
                steps = [
                    { icon: '🚨', title: 'Seek prompt medical attention', desc: 'Visit an ophthalmologist immediately.' },
                    { icon: '📞', title: 'Contact eye specialist', desc: 'Get professional diagnosis and treatment.' },
                    { icon: '⏰', title: 'Early intervention is key', desc: 'Timely treatment prevents complications.' }
                ];
            }
            
            steps.forEach(step => {
                const stepHTML = `
                    <div class="step-card ${resultData.overall_status}">
                        <div class="step-icon">${step.icon}</div>
                        <div class="step-content">
                            <h4>${step.title}</h4>
                            <p>${step.desc}</p>
                        </div>
                    </div>
                `;
                stepsList.innerHTML += stepHTML;
            });
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(24);
            doc.setTextColor(0, 87, 255);
            doc.text('EXU DETECT', 20, 30);
            
            doc.setFontSize(12);
            doc.setTextColor(107, 122, 153);
            doc.text('AI-Powered Eye Screening Report', 20, 40);
            
            doc.setFontSize(14);
            doc.setTextColor(11, 17, 32);
            doc.text('Patient Information', 20, 60);
            
            doc.setFontSize(11);
            const patient = resultData.patient || {};
            doc.text(`Name: ${patient.full_name || '—'}`, 20, 70);
            doc.text(`Age: ${patient.age || '—'}`, 20, 78);
            doc.text(`Blood Group: ${patient.blood_group || '—'}`, 20, 86);
            
            doc.setFontSize(14);
            doc.text('Scan Results', 20, 105);
            
            doc.setFontSize(11);
            doc.text(`Status: ${resultData.status_text}`, 20, 115);
            doc.text(`Confidence: ${resultData.confidence.toFixed(1)}%`, 20, 123);
            doc.text(`Timestamp: ${new Date(resultData.timestamp).toLocaleString()}`, 20, 131);
            
            doc.setFontSize(14);
            doc.text('Recommended Next Steps', 20, 150);
            
            doc.setFontSize(11);
            const recommendation = resultData.recommendation || 'Follow up with a healthcare provider.';
            const splitText = doc.splitTextToSize(recommendation, 170);
            doc.text(splitText, 20, 160);
            
            doc.setFontSize(9);
            doc.setTextColor(107, 122, 153);
            doc.text('Disclaimer: This is an AI-generated report for informational purposes only.', 20, 280);
            doc.text('Always consult a licensed medical professional for actual diagnosis.', 20, 286);
            
            doc.save(`EXU_DETECT_Report_${Date.now()}.pdf`);
        }

        async function shareReport() {
            const shareData = {
                title: 'EXU DETECT - Medical Scan Results',
                text: `Status: ${resultData.status_text} | Confidence: ${resultData.confidence.toFixed(1)}%`,
            };
            
            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    console.log('Share cancelled');
                }
            } else {
                const text = `${shareData.title}\n${shareData.text}`;
                navigator.clipboard.writeText(text).then(() => {
                    alert('Results copied to clipboard!');
                });
            }
        }

        window.addEventListener('DOMContentLoaded', loadResults);
    </script>
</body>
</html>
